# 服务配置
server:
  port: 8080

spring:
  application:
    name: linguaworld

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/linguaworld?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.linguaworld.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: linguaworld-secret-key-2024-lingua-world-platform
  expiration: 86400000  # 24小时

# 文件上传路径配置
file:
  upload:
    path: /tmp/linguaworld/uploads
    max-size: 52428800  # 50MB

# MinIO配置（可选，用于生产环境存储视频和音频）
minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucket: linguaworld

# 日志配置
logging:
  level:
    com.linguaworld: debug
    org.springframework: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
